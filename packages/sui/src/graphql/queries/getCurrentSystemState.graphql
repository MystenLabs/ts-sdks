query getCurrentSystemState($includeProtocolConfig: Boolean! = false) {
	epoch {
		epochId
		referenceGasPrice
		startTimestamp
		protocolConfigs {
			protocolVersion
			featureFlags @include(if: $includeProtocolConfig) {
				key
				value
			}
			configs @include(if: $includeProtocolConfig) {
				key
				value
			}
		}
		systemState {
			json
		}
	}
}
