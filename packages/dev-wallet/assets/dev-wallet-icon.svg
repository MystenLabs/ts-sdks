  <circle cx="48" cy="36" r="3.5" fill="#FCD34D" />
  <circle cx="48" cy="36" r="2" fill="#F59E0B" />
  <!-- Embossed DW text -->
  <text x="26" y="45" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="18" fill="#3730A3" text-anchor="middle" dominant-baseline="middle" letter-spacing="2">DW</text>
  <text x="26" y="44" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="18" fill="#C7D2FE" text-anchor="middle" dominant-baseline="middle" letter-spacing="2">DW</text>
</svg>
