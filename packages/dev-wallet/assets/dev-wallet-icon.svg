<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="walletGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1" />
      <stop offset="100%" style="stop-color:#2563EB" />
    </linearGradient>
    <linearGradient id="flapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8" />
      <stop offset="100%" style="stop-color:#4F46E5" />
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <rect x="9" y="21" width="50" height="36" rx="6" ry="6" fill="#000" opacity="0.1" />
  <!-- Wallet body -->
  <rect x="6" y="18" width="50" height="36" rx="6" ry="6" fill="url(#walletGrad)" />
  <!-- Flap -->
  <path d="M6 26 L6 22 C6 15 8 12 14 12 L46 12 C52 12 56 15 56 22 L56 26 Z" fill="url(#flapGrad)" />
  <!-- Clasp -->
  <rect x="42" y="30" width="18" height="12" rx="4" ry="4" fill="#4338CA" />
