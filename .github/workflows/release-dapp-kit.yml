name: Release @mysten/dapp-kit

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run mode'
        required: false
        default: 'false'
      ref:
        description: 'Git ref or SHA to publish (defaults to main HEAD)'
        required: false
        default: ''

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    # Legacy dapp-kit needs full devDeps for esbuild + vanilla-extract pipeline.
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing
    uses: ./.github/workflows/_release-package.yml
    with:
      package: '@mysten/dapp-kit'
      dir: 'packages/dapp-kit/packages/legacy'
      dry_run: ${{ inputs.dry_run || 'false' }}
      ref: ${{ inputs.ref }}
      full_install: 'true'
