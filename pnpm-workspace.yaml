autoInstallPeers: true
# Without this, peerDeps using `*` (wallet-sdk / wallet-standard for
# @mysten/sui) auto-install the npm-published copy alongside the
# workspace one — two distinct `Transaction` types -> TS2322 in the
# dapp-kit / walrus build chain. With link-workspace-packages on, any
# range that the workspace version satisfies (including `*`) links to
# the workspace sibling instead of the registry copy.
linkWorkspacePackages: true
publicHoistPattern:
  - '*storybook*'
# Enforce that packages must be at least 2 days old before they're installed
# This reduces the risk of supply chain attacks from newly published packages
minimumReleaseAge: 2880
packages:
  - 'packages/**'
  - '!**/dist/**'
  - '!**/.next/**'
  - '!packages/sui/test/**'
  - '!packages/kiosk/test/**'
  - '!packages/codegen/tests/move/**'
  - '!packages/create-dapp/templates/*/move/**'
  - '!packages/sui/scripts'
  - '!packages/sui/transactions'
  - '!packages/sui/cryptography'
  - '!packages/sui/faucet'
  - '!packages/sui/client'
  - '!packages/sui/verify'
  - '!packages/sui/multisig'
  - '!packages/sui/utils'
  - '!packages/sui/bcs'
  - '!packages/enoki/react'
  - '!packages/sui/graphql'
  - '!packages/sui/keypairs/ed25519'
  - '!packages/sui/keypairs/secp256k1'
  - '!packages/sui/keypairs/secp256r1'
  - '!packages/sui/graphql/schemas/2024.1'
  - '!packages/sui/graphql/schemas/2024.4'
  - '!packages/sui/zklogin'
  - '!packages/sui/keypairs/passkey'
  - '!packages/sui/graphql/schema'
  - '!packages/zksend/experimental/unified-adapter'
  - '!packages/sui/experimental'
  - '!packages/dapp-kit/packages/dapp-kit-core/web'
  - '!packages/sui/grpc'
  - '!packages/sui/jsonRpc'
