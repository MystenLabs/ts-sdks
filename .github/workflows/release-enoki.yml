name: Release @mysten/enoki

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run mode'
        required: false
        default: 'false'
      ref:
        description: 'Git ref or SHA to publish (defaults to main HEAD)'
        required: false
        default: ''

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing
    uses: ./.github/workflows/_release-package.yml
    with:
      package: '@mysten/enoki'
      dir: 'packages/enoki'
      dry_run: ${{ inputs.dry_run || 'false' }}
      ref: ${{ inputs.ref }}
      # enoki imports React types — needs @types/react for dts emit
      tools: 'tsdown@0.20.0-beta.1 typescript@5.9.3 @types/node@25.0.8 @types/react@19.2.8'
