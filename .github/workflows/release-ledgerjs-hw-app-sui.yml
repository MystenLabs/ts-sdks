name: Release @mysten/ledgerjs-hw-app-sui

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run mode'
        required: false
        default: 'false'
      ref:
        description: 'Git ref or SHA to publish (defaults to main HEAD)'
        required: false
        default: ''

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  release:
    # Hard-restrict to main. workflow_dispatch lets users pick any branch and
    # run that branch's workflow file; this gate refuses anything other than
    # main. The orchestrator (release.yml) is the only thing that auto-dispatches
    # this workflow; manual UI dispatches still go through this gate.
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing
    uses: ./.github/workflows/_release-package.yml
    with:
      package: '@mysten/ledgerjs-hw-app-sui'
      dir: 'packages/ledgerjs-hw-app-sui'
      dry_run: ${{ inputs.dry_run || 'false' }}
      ref: ${{ inputs.ref }}
      # @types/semver — semver itself is a runtime dep, but its types are
      # devDep-only and tsc --noEmit needs them at build time.
      tools: 'tsdown@0.20.0-beta.1 typescript@5.9.3 @types/node@25.0.8 @types/semver@7.7.1'
